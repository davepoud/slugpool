<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer a Ride | SlugPool</title>
    <link rel="stylesheet" href="styleoffer.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="../landing/main.html">Slug<span>Pool</span></a></div>
            <ul>
                <li><a href="../find-ride/find-ride.html">Find a Ride</a></li>
                <li><a href="../landing/main.html" class="btn-nav">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="form-section">
            <h1>Offer a Ride</h1>
            <p>Post your trip details for other Slugs.</p>

            <form id="rideForm">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="driverName" placeholder="Sammy Slug" required>
                </div>
                <div class="input-group">
                    <label>Pickup Location</label>
                    <input type="text" id="pickup" placeholder="e.g. Science Hill" required>
                </div>
                <div class="input-group">
                    <label>Destination</label>
                    <input type="text" id="destination" placeholder="e.g. San Jose" required>
                </div>
                <div class="input-group">
                    <label>Departure Time</label>
                    <input type="datetime-local" id="departure" required>
                </div>
                <div class="input-group">
                    <label>Seats Available</label>
                    <input type="number" id="seats" min="1" max="8" value="2" required>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Post Ride</button>
            </form>
        </section>
    </main>

    <script>
        // Paste your actual Supabase details here
        const supabaseUrl = 'https://quygixzwxefbsmujzdqi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1eWdpeHp3eGVmYnNtdWp6ZHFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NTM5NTIsImV4cCI6MjA4NzAyOTk1Mn0.AVMoANdjltDeWFgOH7dN-55qgU3kAeva3qRBiDsBF64';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('rideForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Posting...";
            btn.disabled = true;

            const rideData = {
                name: document.getElementById('driverName').value,
                pickup: document.getElementById('pickup').value,
                destination: document.getElementById('destination').value,
                departure: document.getElementById('departure').value,
                seats: parseInt(document.getElementById('seats').value)
            };

            const { error } = await _supabase.from('rides').insert([rideData]);

            if (error) {
                alert("Error: " + error.message);
                btn.innerText = "Post Ride";
                btn.disabled = false;
            } else {
                alert("Ride posted!");
                window.location.href = "../find-ride/find-ride.html";
            }
        });
    </script>
</body>
</html>
